name: arXiv astro-ph arşivi (günlük)

on:
  schedule:
    - cron: '0 8 * * *'   # her gün 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: arXiv'den çek
        run: node scripts/fetch-papers.mjs
      - name: Commit
        run: |
          git config user.name "papers-bot"
          git config user.email "papers-bot@users.noreply.github.com"
          git add data/papers.json 2>/dev/null || true
          git commit -m "Günlük arXiv astro-ph güncelleme" || echo "yeni yok"
          git push || true
